version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pautas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pautas
      POSTGRES_USER: pautas_app
      POSTGRES_PASSWORD: pautas_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - pautas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pautas_app -d pautas"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pautas_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pautas.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pautas_pgdata:
    driver: local
